name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.CLOUDFLARE_TOKEN }}" ]; then
            echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_TOKEN }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.token }}" ]; then
            echo "CLOUDFLARE_API_TOKEN=${{ secrets.token }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.CF_ACCOUNT_ID }}" ]; then
            echo "CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.ID }}" ]; then
            echo "CF_ACCOUNT_ID=${{ secrets.ID }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.id }}" ]; then
            echo "CF_ACCOUNT_ID=${{ secrets.id }}" >> $GITHUB_ENV
          fi
          npx nitro deploy --prebuilt
